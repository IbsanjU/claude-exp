version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost
      - SESSION_SECRET=change-this-secret-in-production
      - GUACAMOLE_HOST=guacd
      - GUACAMOLE_PORT=4822
      # Streaming provider: "mock" (default) or "ivs"
      - STREAMING_PROVIDER=mock
      # AWS credentials (required when STREAMING_PROVIDER=ivs)
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
      # IVS resources (required when STREAMING_PROVIDER=ivs)
      - IVS_RECORDING_BUCKET=
      - IVS_RECORDING_CONFIG_ARN=
      # ECS resources for FFmpeg relay (optional)
      - ECS_CLUSTER=
      - FFMPEG_TASK_DEFINITION=
      - ECS_SUBNET_ID=
      - ECS_SECURITY_GROUP_ID=
    restart: unless-stopped
    networks:
      - web-terminal
    depends_on:
      - guacd

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - web-terminal

  # Guacamole server for RDP support
  guacd:
    image: guacamole/guacd
    restart: unless-stopped
    networks:
      - web-terminal

networks:
  web-terminal:
    driver: bridge
