version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost
      - SESSION_SECRET=change-this-secret-in-production
      - GUACAMOLE_HOST=guacd
      - GUACAMOLE_PORT=4822
    restart: unless-stopped
    networks:
      - web-terminal
    depends_on:
      - guacd

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - web-terminal

  # Guacamole server for RDP support
  guacd:
    image: guacamole/guacd
    restart: unless-stopped
    networks:
      - web-terminal

networks:
  web-terminal:
    driver: bridge
